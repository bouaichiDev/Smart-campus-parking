server:
  port: ${PORT:8082}

spring:
  application:
    name: smart-campus-parking
  datasource:
    # --- Option 1: MySQL (Default - Localhost or Docker via Env Overrides) ---
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campus_parking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # --- Option 2: Localhost PostgreSQL (Uncomment to use) ---
    # url: jdbc:postgresql://localhost:5432/campus_parking_db
    # username: postgres
    # password: your_password
    # driver-class-name: org.postgresql.Driver

    # --- Option 3: Local H2 Database (Uncomment to use) ---
    # url: jdbc:h2:mem:campus_parking_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    # username: sa
    # password:
    # driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        # If using PostgreSQL, uncomment:
        # dialect: org.hibernate.dialect.PostgreSQLDialect
        # If using H2, uncomment:
        # dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # H2 Console configuration (useful if using local H2 database)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

# Spring Security & JWT keys
security:
  jwt:
    secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    expiration: 86400000 # 24 Hours in ms

# API Documentation context configurations
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
